[build]
builder = "NIXPACKS"

[deploy]
# One repo, multiple Railway services:
# - API service: SERVICE_ROLE=api (default)
# - File Worker (file ETL / OCR): SERVICE_ROLE=file_worker
# - MCP Server (AI Agent protocol): SERVICE_ROLE=mcp_server
#
# Environment variables:
# - SERVICE_ROLE: api | file_worker | mcp_server
startCommand = "sh -c 'case \"${SERVICE_ROLE:-api}\" in file_worker) arq src.ingest.file.jobs.worker.WorkerSettings ;; mcp_server) uvicorn mcp_service.server:app --host 0.0.0.0 --port ${PORT} --no-access-log ;; *) uvicorn src.main:app --host 0.0.0.0 --port ${PORT} --workers ${WEB_CONCURRENCY:-2} --no-access-log ;; esac'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[phases.setup]
nixPkgs = ["python312"]

[phases.build]
# Install dependencies from uv.lock (frozen) so the deployed image matches
# what CI tests. Without --frozen the build would re-resolve pyproject.toml
# and could pick up a newer patch (e.g. a future mutai 0.1.7) that CI never tested.
# We export the lock to requirements format because Nixpacks' Python pipeline
# already provisions a venv on PATH, so plain pip install slots in cleanly.
cmds = [
    "pip install --upgrade pip uv",
    "uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements.lock.txt",
    "pip install -r requirements.lock.txt",
    "pip install -e . --no-deps",
]
