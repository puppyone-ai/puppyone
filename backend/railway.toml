# Railway service config for the backend.
#
# Build phases / Nixpacks customization live in `nixpacks.toml` next to this
# file (railway.toml only understands `[build]` and `[deploy]`).
#
# REQUIRED Railway dashboard setting for every service that uses this repo:
#   Settings -> Service -> Source -> Root Directory = `backend` (or `/backend`)
#
# Same Root Directory rule applies to the file_worker / mcp_server services
# that share this repo — they switch behavior via the SERVICE_ROLE env var.
#
# DO NOT move build phases into this file. railway.toml's schema only knows
# `[build]` / `[deploy]` — any `[phases.*]` section here is silently ignored
# and Railway falls back to the default Nixpacks Python pipeline (which then
# fails with `pip install uv==` because $NIXPACKS_UV_VERSION isn't set).
# All Nixpacks customization belongs in `nixpacks.toml`.

[build]
builder = "NIXPACKS"

[deploy]
# One repo, multiple Railway services — switch behavior via SERVICE_ROLE:
#   - api          (default): FastAPI HTTP server
#   - file_worker:            arq worker for file ETL / OCR
#   - mcp_server:             MCP protocol server
startCommand = "sh -c 'case \"${SERVICE_ROLE:-api}\" in file_worker) arq src.ingest.file.jobs.worker.WorkerSettings ;; mcp_server) uvicorn mcp_service.server:app --host 0.0.0.0 --port ${PORT} --no-access-log ;; *) uvicorn src.main:app --host 0.0.0.0 --port ${PORT} --no-access-log ;; esac'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
