# Nixpacks build plan for the backend service.
#
# IMPORTANT: This file is only honored when Railway's service `Root Directory`
# is set to `backend` (or `/backend`). Putting `[phases.*]` inside railway.toml
# does NOT work — railway.toml only knows `[build]` / `[deploy]`, those phase
# blocks are silently dropped.
#
# Why we override `[phases.install]` (not just `[phases.build]`):
# Nixpacks' default Python+uv provider renders the install phase as
#   python -m venv --copies /opt/venv && . /opt/venv/bin/activate \
#     && pip install uv==$NIXPACKS_UV_VERSION \
#     && uv sync --no-dev --frozen
# If $NIXPACKS_UV_VERSION isn't injected (it isn't, intermittently) the
# command becomes `pip install uv==` and the build dies with:
#   ERROR: Invalid requirement: 'uv==': Expected end or semicolon
# Overriding the install phase lets us pin uv and skip the magic env var.
#
# Why uv is hardcoded instead of pulled from `[variables]`:
# Earlier we tried `[variables] UV_VERSION = "0.5.11"` + `'uv==${UV_VERSION}'`
# in the cmd. That broke too — TOML's single quotes survive into the rendered
# Dockerfile RUN line, bash then refuses to expand `${UV_VERSION}` inside
# single quotes, and pip got the literal string `uv==${UV_VERSION}` (same
# class of "Invalid requirement" failure). Hardcoding the version is one
# obvious place to bump and removes a layer of TOML/bash quoting that has
# now bitten us twice. Bump the literal below when you want a newer uv;
# any uv >= 0.5 supports `uv export --format requirements-txt`.

providers = ["python"]

[phases.setup]
nixPkgs = ["python312"]

[phases.install]
# Replace the default Python provider install phase entirely. We:
#   1. create the venv Nixpacks expects at /opt/venv
#   2. install a pinned uv into it
#   3. export the lockfile to a hash-pinned requirements.txt (--frozen ensures
#      the deployed image matches what CI tested — no surprise patch upgrades)
#   4. install requirements + the project itself (editable, no deps)
#
# PEP 517 build isolation note (the `--no-build-isolation` line below):
# `pip install -e .` defaults to creating a fresh environment per build,
# downloading `setuptools` and `wheel` (declared in pyproject.toml's
# [build-system] requires) from PyPI EVERY build. PyPI is flaky enough
# from Railway runners that we periodically see truncated downloads
# ("IncompleteRead(193048 bytes read, 813175 more expected)") that fail
# the build for transient network reasons. Pre-installing the build deps
# into the venv and passing `--no-build-isolation` makes the editable
# install reuse the venv's setuptools/wheel and removes that PyPI fetch.
cmds = [
    "python -m venv --copies /opt/venv",
    # Don't `pip install --upgrade pip` here. Stock venv ships pip 24.2 which
    # is plenty for installing uv, and skipping the upgrade avoids two
    # separate failure modes:
    #   (a) PyPI's JSON simple index has been occasionally returning truncated
    #       responses (`json.decoder.JSONDecodeError: Unterminated string`);
    #       every extra request is one more chance to hit the transient failure.
    #   (b) Railway's base image enforces hash checks on pip wheels (via
    #       PIP_CONSTRAINT / require-hashes). Newer pip releases on PyPI (e.g.
    #       26.1.1) ship with hashes the constraint file doesn't know about,
    #       so `--upgrade pip` fails with
    #       "ERROR: THESE PACKAGES DO NOT MATCH THE HASHES FROM THE REQUIREMENTS FILE."
    # The `|| pip install ...` clause is the retry-on-transient-error path.
    ". /opt/venv/bin/activate && pip install uv==0.5.11 || pip install uv==0.5.11",
    ". /opt/venv/bin/activate && uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements.lock.txt",
    ". /opt/venv/bin/activate && pip install -r requirements.lock.txt",
    # Pre-install build deps inside the venv (one PyPI fetch with retry),
    # then run the editable install with --no-build-isolation so it does
    # NOT spin up its own short-lived env that re-downloads them.
    ". /opt/venv/bin/activate && pip install --retries 5 'setuptools>=61.0' wheel || pip install --retries 5 'setuptools>=61.0' wheel",
    ". /opt/venv/bin/activate && pip install -e . --no-deps --no-build-isolation",
    # Override mut with the git-format-storage branch — the published
    # ``mutai 0.1.6`` on PyPI is missing ``mut.foundation.git_format``,
    # ``branch``, ``messages`` and ``ws_client`` (verified by inspecting
    # the wheel). 11 backend files have module-level imports of
    # ``mut.foundation.git_format`` (server_repo, object_gc, tree_objects,
    # git_commit, …), so without this override FastAPI fails at startup
    # with ``ImportError: No module named 'mut.foundation.git_format'``.
    # The previously pinned ``fix/mut-scope-design-bug`` branch ALSO
    # lacked git_format — it predates the git-format-storage work.
    # Remove this override once a mutai release with git_format is on PyPI
    # and ``[project.dependencies]`` is bumped to that version.
    ". /opt/venv/bin/activate && pip install --no-deps git+https://github.com/puppyone-ai/mut.git@feat/git-format-storage",
]
