<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <style>
      .body { fill: #4A4A4A; }
      .face { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Left ear -->
  <rect class="body" x="10" y="48" width="12" height="20" rx="4" ry="4"/>

  <!-- Right ear -->
  <rect class="body" x="98" y="48" width="12" height="20" rx="4" ry="4"/>

  <!-- Head (rounded rectangle) -->
  <rect class="body" x="20" y="24" width="80" height="76" rx="18" ry="18"/>

  <!-- Top antenna base -->
  <rect class="body" x="50" y="10" width="20" height="20" rx="6" ry="6"/>

  <!-- Left eye -->
  <rect class="face" x="36" y="48" width="16" height="14" rx="3" ry="3"/>

  <!-- Right eye -->
  <rect class="face" x="68" y="48" width="16" height="14" rx="3" ry="3"/>

  <!-- Mouth background -->
  <rect class="face" x="36" y="72" width="48" height="14" rx="3" ry="3"/>

  <!-- Mouth dividers -->
  <line x1="52" y1="72" x2="52" y2="86" stroke="#4A4A4A" stroke-width="3"/>
  <line x1="68" y1="72" x2="68" y2="86" stroke="#4A4A4A" stroke-width="3"/>
</svg>
