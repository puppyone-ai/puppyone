services:

  # ── Supabase: Database ──────────────────────────────────────
  db:
    image: supabase/postgres:15.6.1.143
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../supabase/migrations/20260306085814_qubits_schema.sql:/docker-entrypoint-initdb.d/99-migrations.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Supabase: Auth (GoTrue) ────────────────────────────────
  auth:
    image: supabase/gotrue:v2.158.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:${SUPABASE_API_PORT:-8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:${FRONTEND_PORT:-3000}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMS_AUTOCONFIRM: "true"
    restart: unless-stopped

  # ── Supabase: REST API (PostgREST) ─────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    restart: unless-stopped

  # ── Supabase: API Gateway (Kong) ───────────────────────────
  kong:
    image: kong:2.8.1
    ports:
      - "${SUPABASE_API_PORT:-8000}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      auth:
        condition: service_started
      rest:
        condition: service_started
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible storage) ──────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-minioadmin} $${S3_SECRET_KEY:-minioadmin};
      mc mb local/$${S3_BUCKET:-contextbase} --ignore-existing;
      "

  # ── PuppyOne: Backend API ──────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-9090}:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SANDBOX_TMPDIR:-/tmp/puppyone-sandbox}:${SANDBOX_TMPDIR:-/tmp/puppyone-sandbox}
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      APP_MODULE: src.main
      DEBUG: "true"
      PORT: "9090"
      PUBLIC_URL: http://localhost:${BACKEND_PORT:-9090}
      INTERNAL_API_SECRET: docker-local-secret
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU}
      SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SKIP_AUTH: ${SKIP_AUTH:-false}
      USE_REAL_S3: "false"
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: ${S3_BUCKET:-contextbase}
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      ETL_REDIS_URL: redis://redis:6379
      ENABLE_ETL: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: https://api.anthropic.com
      ANTHROPIC_MODEL: claude-sonnet-4-20250514
      SANDBOX_TYPE: ${SANDBOX_TYPE:-docker}
      SANDBOX_TMPDIR: ${SANDBOX_TMPDIR:-/tmp/puppyone-sandbox}
      E2B_API_KEY: ${E2B_API_KEY:-}
      DOCKER_HOST: unix:///var/run/docker.sock
    restart: unless-stopped

  # ── PuppyOne: Frontend ─────────────────────────────────────
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:${SUPABASE_API_PORT:-8000}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-9090}
        NEXT_PUBLIC_DEV_MODE: "true"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:${SUPABASE_API_PORT:-8000}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-9090}
      NEXT_PUBLIC_DEV_MODE: "true"
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:9090}
      SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-http://kong:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  minio_data:
