name: Check PR Target

# Block PRs that target `main` from any branch other than `qubits`. This keeps
# `main` strictly downstream of `qubits` (the staging branch), so every change
# that reaches production has been validated in staging first.
#
# Why `pull_request_target` and not `pull_request`:
#   - `pull_request_target` runs in the context of the base repo (puppyone-ai),
#     so it has the GITHUB_TOKEN permissions needed to comment on PRs from
#     external forks. We do NOT check out untrusted PR code here, so this is
#     safe — the workflow only reads PR metadata.

on:
  pull_request_target:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-target:
    name: Check PR Target
    runs-on: ubuntu-latest
    steps:
      - name: Block non-qubits PRs to main
        if: github.head_ref != 'qubits'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const head = context.payload.pull_request.head.ref;
            const body = [
              `Hi @${author}, thanks for the PR!`,
              ``,
              `This PR targets \`main\` from \`${head}\`, but \`main\` only accepts PRs whose source branch is \`qubits\` (the staging branch).`,
              ``,
              `**To fix this:**`,
              `- For most contributions: change the base branch of this PR from \`main\` to \`qubits\`. Click "Edit" next to the PR title, then change the base branch dropdown.`,
              `- The change will reach \`main\` automatically when a maintainer opens the next \`qubits\` → \`main\` release PR.`,
              ``,
              `If this is an urgent production hotfix that must skip staging, please coordinate with the maintainers in the PR comments.`,
              ``,
              `See [CONTRIBUTING.md](https://github.com/puppyone-ai/puppyone/blob/main/CONTRIBUTING.md#pull-request-flow) for the full workflow.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            core.setFailed(`PR base must be 'qubits' for changes targeting 'main'. Got head='${head}'.`);

      - name: OK — PR base is qubits
        if: github.head_ref == 'qubits'
        run: echo "PR head ref is 'qubits' — allowed to target main."
