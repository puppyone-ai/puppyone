name: Deploy Migrations to Staging

on:
  push:
    branches:
      - newmu
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }}

      - name: Push migrations (dry run)
        run: supabase db push --dry-run

      - name: Push migrations
        run: supabase db push

      - name: Smoke test — verify critical triggers
        env:
          PGPASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          PGHOST: db.${{ secrets.STAGING_PROJECT_ID }}.supabase.co
        run: |
          set -euo pipefail
          command -v dig >/dev/null || sudo apt-get update -qq && sudo apt-get install -y -qq dnsutils
          IPV4=$(dig +short A "$PGHOST" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$IPV4" ]; then
            echo "::error::Could not resolve IPv4 A record for ${PGHOST}"
            exit 1
          fi
          psql "hostaddr=${IPV4} host=${PGHOST} port=5432 dbname=postgres user=postgres sslmode=require" \
            -f supabase/tests/smoke_test_triggers.sql

      - name: Detect schema drift
        run: |
          DIFF=$(supabase db diff --linked 2>&1) || true
          if [ -n "$DIFF" ] && ! echo "$DIFF" | grep -q "No schema changes found"; then
            echo "::warning::Schema drift detected after migration push!"
            echo "$DIFF"
          fi

      - name: Notify on failure (email)
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_SMTP_USERNAME }}
          password: ${{ secrets.ALERT_SMTP_PASSWORD }}
          from: PuppyOne CI <${{ secrets.ALERT_SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_EMAIL_TO }}
          subject: "⚠️ [STAGING] Migration failed: ${{ github.event.head_commit.message }}"
          body: |
            Staging migration push FAILED.

            Workflow: ${{ github.workflow }}
            Commit:   ${{ github.sha }}
            Author:   ${{ github.event.head_commit.author.name }}
            Message:  ${{ github.event.head_commit.message }}

            View logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Fix this BEFORE merging to main, otherwise production will break too.
