name: Validate Migrations (PR Check)

on:
  pull_request:
    paths:
      - "supabase/migrations/**"

jobs:
  lint-rpc-signatures:
    name: Lint RPC parameter types (new migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Catch the exact class of bug from 2026-04-17: CAS RPCs were declared
      # with p_project_id UUID while projects.id / mut_*.project_id are TEXT,
      # producing PostgreSQL error 42883 ("operator does not exist: text = uuid")
      # at runtime. Only newly added migrations are checked so historical bug
      # fixes (which keep both the original and the fix migration) still pass.
      - name: Enforce p_project_id TEXT in new migrations
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF" --depth=1
          NEW_MIGRATIONS=$(git diff --diff-filter=A --name-only "origin/$BASE_REF...HEAD" -- 'supabase/migrations/*.sql' || true)

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migrations in this PR; skipping RPC signature lint."
            exit 0
          fi

          echo "Scanning new migrations:"
          echo "$NEW_MIGRATIONS"
          echo ""

          VIOLATIONS=""
          for f in $NEW_MIGRATIONS; do
            [ -f "$f" ] || continue
            # Flag any p_project_id parameter declared as a non-TEXT type.
            MATCH=$(grep -niE 'p_project_id[[:space:]]+(UUID|INT|BIGINT|BIGSERIAL|SERIAL|VARCHAR|CHAR)\b' "$f" || true)
            if [ -n "$MATCH" ]; then
              VIOLATIONS="${VIOLATIONS}${f}:${MATCH}"$'\n'
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::New migration(s) declare p_project_id with a non-TEXT type."
            echo "project_id columns in this repo are TEXT (values are UUID strings)."
            echo "See docs/design/mut-scope-concurrency.md for the type convention."
            echo ""
            echo "$VIOLATIONS"
            exit 1
          fi

          echo "OK: all new migrations use TEXT for p_project_id."

  validate-staging:
    name: Dry-run against Staging DB
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }}

      - name: Validate migrations (dry-run)
        run: supabase db push --dry-run

      # If this PR adds new migration files, `supabase db diff --linked` will
      # naturally output `drop` statements for the objects those migrations
      # create (the linked DB hasn't run them yet). Recent supabase-cli
      # versions exit non-zero on such drops, which would mis-flag a normal
      # "PR adds a new table" as drift. Skip the drift check in that case;
      # real drift is caught on the next PR that does NOT add migrations.
      - name: Detect new migrations in this PR
        id: new-migrations
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF" --depth=1
          NEW=$(git diff --diff-filter=A --name-only "origin/$BASE_REF...HEAD" -- 'supabase/migrations/*.sql' || true)
          if [ -z "$NEW" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No new migration files in this PR."
          else
            echo "$NEW" | wc -l | xargs -I{} echo "count={}" >> "$GITHUB_OUTPUT"
            echo "New migration files in this PR:"
            echo "$NEW"
          fi

      - name: Check for schema drift
        if: steps.new-migrations.outputs.count == '0'
        run: |
          DIFF=$(supabase db diff --linked 2>&1) || true
          if [ -n "$DIFF" ] && ! echo "$DIFF" | grep -q "No schema changes found"; then
            echo "::warning::Staging DB has schema drift — manual changes exist that are not in migrations"
            echo "$DIFF"
          fi

      - name: Drift check skipped (PR adds new migrations)
        if: steps.new-migrations.outputs.count != '0'
        run: |
          echo "::notice::Drift check skipped because this PR adds new migration file(s)."
          echo "New migrations naturally produce 'drop' statements in 'supabase db diff --linked'"
          echo "until they are applied to the linked DB. The next PR with no new migrations"
          echo "will re-run the drift check and catch any real manual drift."

  validate-production:
    name: Dry-run against Production DB
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}

      - name: Validate migrations (dry-run)
        run: supabase db push --dry-run

      # See validate-staging block for the rationale on this guard.
      - name: Detect new migrations in this PR
        id: new-migrations
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF" --depth=1
          NEW=$(git diff --diff-filter=A --name-only "origin/$BASE_REF...HEAD" -- 'supabase/migrations/*.sql' || true)
          if [ -z "$NEW" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No new migration files in this PR."
          else
            echo "$NEW" | wc -l | xargs -I{} echo "count={}" >> "$GITHUB_OUTPUT"
            echo "New migration files in this PR:"
            echo "$NEW"
          fi

      - name: Check for schema drift
        if: steps.new-migrations.outputs.count == '0'
        run: |
          DIFF=$(supabase db diff --linked 2>&1) || true
          if [ -n "$DIFF" ] && ! echo "$DIFF" | grep -q "No schema changes found"; then
            echo "::error::Production DB has schema drift — manual changes exist that are not in migrations"
            echo "$DIFF"
            exit 1
          fi

      - name: Drift check skipped (PR adds new migrations)
        if: steps.new-migrations.outputs.count != '0'
        run: |
          echo "::notice::Drift check skipped because this PR adds new migration file(s)."
          echo "New migrations naturally produce 'drop' statements in 'supabase db diff --linked'"
          echo "until they are applied to the linked DB. The next PR with no new migrations"
          echo "will re-run the drift check and catch any real manual drift."
