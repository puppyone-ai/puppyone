name: Deploy Migrations to Production

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}

      - name: Push migrations (dry run first)
        run: supabase db push --dry-run

      - name: Push migrations
        run: supabase db push

      - name: Smoke test — verify critical triggers
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.PRODUCTION_DB_PASSWORD }}@db.${{ secrets.PRODUCTION_PROJECT_ID }}.supabase.co:5432/postgres
        run: psql "$DATABASE_URL" -f supabase/tests/smoke_test_triggers.sql

      - name: Detect schema drift
        run: |
          DIFF=$(supabase db diff --linked 2>&1) || true
          if [ -n "$DIFF" ] && ! echo "$DIFF" | grep -q "No schema changes found"; then
            echo "::warning::Schema drift detected after migration push!"
            echo "$DIFF"
            echo ""
            echo "The remote database has manual changes that are not captured in migrations."
            echo "Create a new migration to reconcile: supabase db diff -f <name>"
          fi

      - name: Notify on failure (email)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_SMTP_USERNAME }}
          password: ${{ secrets.ALERT_SMTP_PASSWORD }}
          from: PuppyOne CI <${{ secrets.ALERT_SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_EMAIL_TO }}
          subject: "🚨 [PROD] Migration failed: ${{ github.event.head_commit.message }}"
          body: |
            Production migration push FAILED.

            Workflow: ${{ github.workflow }}
            Commit:   ${{ github.sha }}
            Author:   ${{ github.event.head_commit.author.name }}
            Message:  ${{ github.event.head_commit.message }}

            View logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ⚠️ Production database may be in a partially-migrated state.
            Run `supabase db push` manually to retry, or revert the offending migration.
